spring.application.name=flotera

# Default profile is local, but Render will provide environment variables
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Database Configuration (Mapped to Environment Variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:flotera;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# Common settings
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# JWT Secret
jwt.secret=${JWT_SECRET:KO/VVdfYjGhbFc5BGswC9HR8SeDtj18XFA7CABReH2+d7dDl6mc9Vjc7WYapF75D06M+jBRcswLjld3Ajxp6sA==}

# Port (Render uses PORT)
server.port=${PORT:8080}
